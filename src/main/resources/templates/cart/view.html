<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout1}">
<head>
  <title>장바구니</title>
  <th:block layout:fragment="page_head">
    <link rel="stylesheet" th:href="@{/css/pages/cart.css?v=1}">
  </th:block>
</head>
<body>
<div layout:fragment="content" class="container-xxl py-4">

  <h2 class="h4 mb-4">장바구니</h2>

  <form th:action="@{'/cart/' + ${cart.memberId} + '/clear'}" method="post" class="text-end mb-3">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit" class="btn btn-outline-danger btn-sm">선택 삭제</button>
  </form>

  <div th:if="${#lists.isEmpty(cart.items)}" class="alert alert-info text-center">
    장바구니가 비어 있습니다.
  </div>

  <div th:if="${!#lists.isEmpty(cart.items)}">

    <div class="list-group mb-4">
      <div class="list-group-item list-group-item-light fw-bold d-flex">
        <div class="col-1 text-center"><input type="checkbox" checked disabled></div>
        <div class="col-7">상품정보</div>
        <div class="col-1 text-center">수량</div>
        <div class="col-1 text-end">가격</div>
        <div class="col-1 text-end">총액</div>
        <div class="col-1 text-end">삭제</div>
      </div>

      <div th:each="it : ${cart.items}" class="list-group-item d-flex align-items-center">
        <div class="col-1 text-center">
          <form th:action="@{'/cart/' + ${cart.memberId} + '/update'}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="cartItemId" th:value="${it.cartItemId}">
            <input type="checkbox" name="checked" value="true"
                   class="form-check-input" th:checked="${it.checked}" onchange="this.form.submit()">
          </form>
        </div>

        <div class="col-7 d-flex align-items-center gap-3">
          <img th:src="${it.thumbnailUrl != null} ? ${it.thumbnailUrl} : @{/img/products/placeholder.webp}"
               th:alt="${it.itemName}" class="rounded" width="80" height="80">
          <div>
            <div class="fw-semibold" th:text="${it.itemName}">샐러드 25종 골라담기</div>
            <div class="text-muted small" th:text="${it.itemOption}">옵션 정보</div>
            <div class="text-muted small" th:if="${it.additionalInfo != null}" th:text="${it.additionalInfo}">추가정보</div>
          </div>
        </div>

        <div class="col-1 text-center">
          <form th:action="@{'/cart/' + ${cart.memberId} + '/update'}" method="post" class="d-flex justify-content-center align-items-center gap-1">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="cartItemId" th:value="${it.cartItemId}">
            <button class="btn btn-outline-secondary btn-sm" name="op" value="dec">−</button>
            <input class="form-control form-control-sm text-center" style="width: 50px" name="quantity"
                   type="number" min="1" th:value="${it.quantity}">
            <button class="btn btn-outline-secondary btn-sm" name="op" value="inc">＋</button>
          </form>
        </div>

        <div class="col-1 text-end" th:text="${#numbers.formatInteger(it.salePrice,0,'COMMA')} + '원'">10,900원</div>
        <div class="col-1 text-end fw-bold" th:text="${#numbers.formatInteger(it.linePayable,0,'COMMA')} + '원'">10,900원</div>

        <div class="col-1 text-end">
          <form th:action="@{/cart/remove}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="ids" th:value="${it.cartItemId}">
            <button class="btn btn-link text-danger p-0">🗑</button>
          </form>
        </div>
      </div>
    </div>

    <!-- 요약 -->
    <div class="border p-3 rounded mb-4">
      <div class="row text-center fw-semibold">
        <div class="col">총 상품금액</div>
        <div class="col">총 할인금액</div>
        <div class="col">총 배송비</div>
        <div class="col">결제금액</div>
      </div>
      <div class="row text-center fs-5">
        <div class="col" th:text="${#numbers.formatInteger(cart.summary.productsTotal,0,'COMMA')} + '원'">12,000원</div>
        <div class="col text-success" th:text="${#numbers.formatInteger(cart.summary.discountTotal,0,'COMMA')} + '원'">1,100원</div>
        <div class="col" th:text="${#numbers.formatInteger(cart.summary.shippingFee,0,'COMMA')} + '원'">3,500원</div>
        <div class="col fw-bold" th:text="${#numbers.formatInteger(cart.summary.payableAmount,0,'COMMA')} + '원'">14,400원</div>
      </div>
    </div>

    <!-- 버튼 -->
    <div class="d-flex justify-content-center gap-3">
      <a th:href="@{/thymeleaf/main}" class="btn btn-outline-secondary">쇼핑 계속하기</a>

      <form th:action="@{/order/checkout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="scope" value="selected">
        <input type="hidden" name="ids" id="selectedIds">
        <button type="submit" class="btn btn-outline-success">선택 상품 주문</button>
      </form>

      <form th:action="@{/order/checkout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="scope" value="all">
        <button type="submit" class="btn btn-success">전체 주문</button>
      </form>
    </div>
  </div>

</div>

<th:block layout:fragment="page_foot">
  <script>
    // 선택 상품 주문용 체크된 항목 모으기
    document.querySelectorAll('.item-check')?.forEach(chk => {
      chk.addEventListener('change', () => {
        const selected = Array.from(document.querySelectorAll('.item-check:checked'))
                .map(el => el.value)
                .join(',');
        document.getElementById('selectedIds').value = selected;
      });
    });
  </script>
</th:block>
</body>
</html>
