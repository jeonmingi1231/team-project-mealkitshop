<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout1}">
<head>
    <title>장바구니</title>

    <!-- 페이지 전용 CSS -->
    <th:block layout:fragment="page_head">
        <link rel="stylesheet" th:href="@{/css/pages/cart.css?v=1}">
    </th:block>
</head>

<body>
<div layout:fragment="content" class="container-xxl py-4">

    <!-- 단계 표시 -->
    <nav class="checkout-steps mb-4" aria-label="주문 단계">
        <ol class="steps">
            <li class="active"><span>01 장바구니</span></li>
            <li><span>02 주문서/결제</span></li>
            <li><span>03 주문완료</span></li>
        </ol>
    </nav>

    <h2 class="h4 mb-3">장바구니</h2>

    <!-- 선택 액션(찜 제외) -->
    <div class="d-flex justify-content-end align-items-center gap-3 mb-2">
        <form th:action="@{/cart/remove}" method="post" id="removeForm" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <!-- 선택된 cartItemId 콤마 문자열 -->
            <input type="hidden" name="ids" id="removeIds">
            <button type="submit" class="btn btn-link text-muted p-0">선택 삭제</button>
        </form>
    </div>

    <!-- 장바구니 본문 -->
    <section class="cart-section card">
        <div class="card-header bg-white d-flex align-items-center gap-2">
            <span class="fw-semibold">일반상품</span>
        </div>

        <div class="card-body p-0">
            <ul class="list-group list-group-flush">

                <!-- 빈 상태 -->
                <li class="list-group-item py-5 text-center text-muted"
                    th:if="${cart == null or #lists.isEmpty(cart.items)}">
                    장바구니가 비어 있습니다.
                </li>

                <!-- 아이템 -->
                <li class="list-group-item cart-item"
                    th:each="it : ${cart.items}"
                    th:data-id="${it.cartItemId}">
                    <div class="row g-3 align-items-center">

                        <!-- 선택 체크(선택 주문/삭제 용도: 서버 저장 아님) -->
                        <div class="col-auto">
                            <input class="form-check-input item-check" type="checkbox"
                                   th:value="${it.cartItemId}"
                                   th:checked="${it.checked}"> <!-- 초기값만 반영 -->
                        </div>

                        <!-- 썸네일 -->
                        <div class="col-auto">
                            <img th:src="${it.thumbnailUrl != null} ? ${it.thumbnailUrl} : @{/img/products/placeholder.webp}"
                                 th:alt="${it.itemName}" width="80" height="80" class="rounded">
                        </div>

                        <!-- 정보 -->
                        <div class="col">
                            <div class="item-title fw-semibold" th:text="${it.itemName}">상품명</div>

                            <!-- 가격 표시: 할인 시 정상가(취소선)+판매가, 퍼센트 배지 -->
                            <div class="small text-muted">
                <span th:if="${it.discountPrice != null and it.discountPrice < it.listPrice}"
                      class="text-decoration-line-through me-2"
                      th:text="${#numbers.formatInteger(it.listPrice,3,'COMMA')} + '원'">0원</span>
                                <span class="fw-semibold text-dark"
                                      th:text="${#numbers.formatInteger((it.discountPrice != null ? it.discountPrice : it.salePrice != null ? it.salePrice : it.listPrice),3,'COMMA')} + '원'">0원</span>

                                <span class="badge bg-danger-subtle text-danger-emphasis ms-2"
                                      th:if="${it.discountPrice != null and it.discountPrice < it.listPrice}"
                                      th:text="'-'+ ${T(java.lang.Math).round((it.listPrice - it.discountPrice) * 100.0 / it.listPrice)} + '%'">-10%</span>
                            </div>
                        </div>

                        <!-- 수량 스텝퍼 (cartItemId 기준으로 변경) -->
                        <div class="col-auto">
                            <form th:action="@{/cart/update}" method="post" class="qty-form d-inline-flex align-items-center">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="cartItemId" th:value="${it.cartItemId}">
                                <div class="input-group qty-stepper">
                                    <button class="btn btn-outline-secondary" name="op" value="dec" type="submit" aria-label="수량 감소">−</button>
                                    <input class="form-control text-center" name="quantity" th:value="${it.quantity}" min="1" type="number">
                                    <button class="btn btn-outline-secondary" name="op" value="inc" type="submit" aria-label="수량 증가">＋</button>
                                </div>
                            </form>
                        </div>

                        <!-- 합계(서버 계산값 사용) -->
                        <div class="col-auto text-end">
                            <div class="price fw-bold"
                                 th:text="${#numbers.formatInteger(it.lineTotal,3,'COMMA')} + '원'">0원</div>
                            <div class="text-success small"
                                 th:if="${it.lineDiscount != null and it.lineDiscount > 0}"
                                 th:text="'할인 ' + ${#numbers.formatInteger(it.lineDiscount,3,'COMMA')} + '원'">할인 0원</div>
                        </div>

                        <!-- 삭제 아이콘 -->
                        <div class="col-auto">
                            <form th:action="@{/cart/remove}" method="post" class="m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="ids" th:value="${it.cartItemId}">
                                <button class="btn btn-link text-muted p-0" aria-label="삭제">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </form>
                        </div>

                    </div>
                </li>
            </ul>
        </div>
    </section>

    <!-- 합계 (CartSummaryResponse 매핑) -->
    <section class="totals card mt-4" th:if="${cart != null}">
        <div class="card-body">
            <div class="row text-center align-items-center g-3 totals-row">
                <div class="col-6 col-lg-3">
                    <div class="label">총 상품금액</div>
                    <div class="value" id="sumProducts"
                         th:text="${#numbers.formatInteger(cart.summary.productsTotal,3,'COMMA')} + '원'">0원</div>
                </div>
                <div class="col-6 col-lg-1 d-none d-lg-block">−</div>

                <div class="col-6 col-lg-3">
                    <div class="label">총 할인금액</div>
                    <div class="value text-success" id="sumDiscount"
                         th:text="${#numbers.formatInteger(cart.summary.discountTotal,3,'COMMA')} + '원'">0원</div>
                </div>
                <div class="col-6 col-lg-1 d-none d-lg-block">＋</div>

                <div class="col-6 col-lg-2">
                    <div class="label">총 배송비</div>
                    <div class="value" id="sumShipping"
                         th:text="${#numbers.formatInteger(cart.summary.shippingFee,3,'COMMA')} + '원'">0원</div>
                </div>
                <div class="col-6 col-lg-1 d-none d-lg-block">＝</div>

                <div class="col-12 col-lg-2">
                    <div class="label">결제금액</div>
                    <div class="value fw-bold" id="sumPay"
                         th:text="${#numbers.formatInteger(cart.summary.payableAmount,3,'COMMA')} + '원'">0원</div>
                </div>
            </div>
            <p class="text-muted small mt-3">※ 네이버페이 결제 시 새벽배송 불가, 쿠폰/적립금은 주문서 작성 단계에서 적용 가능</p>
        </div>
    </section>

    <!-- CTA -->
    <div class="d-grid d-sm-flex gap-2 mt-4">
        <a th:href="@{/thymeleaf/main}" class="btn btn-outline-secondary flex-fill">쇼핑 계속하기</a>

        <!-- 선택 상품 주문 -->
        <form th:action="@{/order/checkout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="scope" value="selected">
            <!-- 체크된 cartItemId를 JS가 채움 -->
            <input type="hidden" name="ids" id="orderSelectedIds">
            <button type="submit" class="btn btn-outline-success flex-fill" id="btnOrderSelected" disabled>
                선택 상품 주문
            </button>
        </form>

        <!-- 전체 주문 -->
        <form th:action="@{/order/checkout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="scope" value="all">
            <button type="submit" class="btn btn-success flex-fill">
                전체 주문
            </button>
        </form>
    </div>

</div>

<!-- 페이지 전용 JS -->
<th:block layout:fragment="page_foot">
    <script th:src="@{/js/cart.js?v=2}" defer></script>
</th:block>
</body>
</html>
